<div class="container mt-4">
  <h3>Notes de frais à valider</h3>

  <table class="table table-striped table-hover mt-3">
    <thead>
      <tr>
        <th>Employé</th>
        <th>Mission</th>
        <th>Montant</th>
        <th>Statut</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let f of fraisAValider">

        <td>{{ f.employeeNom }} {{ f.employeePrenom }}</td>

        <td>{{ f.missionNom }}</td>

        <td>{{ f.montant | number:'1.2-2' }} €</td>

        <td>
          <span class="badge bg-warning text-dark">
            {{ f.statut }}
          </span>
        </td>

        <td>

          <button
            class="btn btn-sm btn-info me-2"
            (click)="voir(f.id)">
            Voir
          </button>

          <button
            class="btn btn-sm btn-success me-2"
            (click)="approuver(f.id)">
            Approuver
          </button>

          <button
            class="btn btn-sm btn-danger"
            (click)="rejeter(f.id)">
            Rejeter
          </button>

        </td>

      </tr>
    </tbody>
  </table>
</div>
