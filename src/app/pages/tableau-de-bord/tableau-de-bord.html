<div class="container-fluid pt-4 px-4" *ngIf="statistiques; else loading">
  <div class="row g-4">
    
    <!-- En attente -->
    <div class="col-sm-6 col-xl-4">
      <div class="card bg-warning text-dark border-0 shadow-sm h-100">
        <div class="card-body d-flex align-items-center justify-content-between p-4">
          <div>
            <h6 class="mb-2">En attente de validation</h6>
            <h3 class="mb-0 fw-bold">{{ statistiques.enAttente }}</h3>
          </div>
          <div class="fs-1 opacity-50">⏳</div>
        </div>
      </div>
    </div>

    <!-- Total Approuvé -->
    <div class="col-sm-6 col-xl-4">
      <div class="card bg-success text-white border-0 shadow-sm h-100">
        <div class="card-body d-flex align-items-center justify-content-between p-4">
          <div>
            <h6 class="mb-2">Total Approuvé</h6>
            <h3 class="mb-0 fw-bold">{{ statistiques.montantTotalApprouve | number:'1.3-3' }} DT</h3>
          </div>
          <div class="fs-1 opacity-50">💰</div>
        </div>
      </div>
    </div>

    <!-- Total Demandes -->
    <div class="col-sm-6 col-xl-4">
      <div class="card bg-primary text-white border-0 shadow-sm h-100">
        <div class="card-body d-flex align-items-center justify-content-between p-4">
          <div>
            <h6 class="mb-2">Total des demandes</h6>
            <h3 class="mb-0 fw-bold">{{ statistiques.totalFrais }}</h3>
          </div>
          <div class="fs-1 opacity-50">📊</div>
        </div>
      </div>
    </div>

  </div>
</div>

<ng-template #loading>
  <div class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">Chargement des statistiques...</p>
  </div>
</ng-template>

<!-- Section Graphique UNIQUE avec Filtre -->
<div class="row mt-4">
  <div class="col-12">
    <div class="card border-0 shadow-sm p-4">
      
      <!-- En-tête avec le filtre d'affichage demandé -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="card-title m-0">Répartition des frais</h5>
        <div class="w-25">
          <select class="form-select form-select-sm" [(ngModel)]="modeFiltre" (change)="changerModeFiltre()">
            <option value="statut">Par Statut</option>
            <option value="mission">Par Mission</option>
          
            <option value="employe" *ngIf="isManager">Par Employé</option>
          </select>
        </div>
      </div>

      <div style="position: relative; height: 300px;">
        <canvas id="statutChart"></canvas>
      </div>

    </div>
  </div>
</div>
