<!-- Sidebar -->
<div class="d-flex" style="min-height: 100vh;">
  <div class="sidebar text-white" style="width: 250px; background-color: #22834C;">
    <div class="p-4 text-center border-bottom border-secondary">
      <h5 class="mb-0">{{ userRole }}</h5>
    </div>
    
    <div class="nav flex-column mt-3">
      <!-- Tableau de bord -->
      <a routerLink="/dashboard/tableau-de-bord" class="nav-link text-white py-3 px-4">
        <i class="bi bi-house-door me-3"></i> Tableau de bord
      </a>
      
      <!-- Expenses -->
      <a routerLink="/dashboard/frais/liste" class="nav-link text-white py-3 px-4">
        <i class="bi bi-wallet2 me-3"></i> Expenses
      </a>

      <!-- Validation (Manager uniquement) -->
      <a *ngIf="userRole === 'Manager'" 
         routerLink="/dashboard/frais/validation" 
         class="nav-link text-white py-3 px-4">
         <i class="bi bi-check2-circle me-3"></i> Validation
      </a>

      
    </div>
    
    <!-- Logout -->
    <div class="mt-auto p-3 w-100">
      <button class="btn btn-outline-light w-100" (click)="onLogout()">
        <i class="bi bi-box-arrow-left me-2"></i> Log Out
      </button>
    </div>
  </div>

  <!-- Contenu Principal -->
  <div class="flex-grow-1 bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-4 py-3">
      <span class="navbar-brand mb-0 h1 text-secondary">Bienvenue, {{ userName }}</span>
    </nav>

    <div class="p-4">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
